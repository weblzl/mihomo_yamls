proxy-providers:
  A机场:
    type: http
    # 替换为 A 机场 Clash/Mihomo 订阅链接
    url: ""
    path: ./proxy_provider/air1.yaml
    interval: 300
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  B机场:
    type: http
    # 替换为 B 机场 Clash/Mihomo 订阅链接
    url: ""
    path: ./proxy_provider/air2.yaml
    interval: 300
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600

  C机场:
    type: http
    # 替换为 C 机场 Clash/Mihomo 订阅链接
    url: ""
    path: ./proxy_provider/air3.yaml
    interval: 300
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600

proxy-groups:
  # --- 主控层 ---
  - {
      name: 🚀 节点选择,
      type: select,
      proxies: [ A机场全线路自动优选, B机场全线路自动优选, C全线路优选, A机场常用, B机场常用, 🎯 全球直连 ],
    }

  # --- 机场常用入口 ---
  - {
      name: A机场常用,
      type: select,
      proxies: [ A-香港节点, A-日本节点, A-新加坡节点, A-美国节点, A-韩国节点, A-台湾节点, A-欧洲节点, A-其他地区 ],
    }
  - {
      name: B机场常用,
      type: select,
      proxies: [ B-美国节点, B-新加坡节点, B-香港节点, B-日本节点, B-韩国节点, B-台湾节点, B-欧洲节点, B-其他地区 ],
    }

  # --- 机场全线路自动优选 ---
  - {
      name: A机场全线路自动优选,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      proxies: [ A-香港节点, A-日本节点, A-新加坡节点, A-美国节点, A-韩国节点, A-台湾节点, A-欧洲节点, A-其他地区 ],
    }
  - {
      name: B机场全线路自动优选,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      proxies: [ B-美国节点, B-新加坡节点, B-香港节点, B-日本节点, B-韩国节点, B-台湾节点, B-欧洲节点, B-其他地区 ],
    }
  - {
      name: C全线路优选,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ C机场 ],
    }

  # --- 跨机场优选层 ---
  - {
      name: 🇺🇸 全线路美国优选,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      proxies: [ A-美国节点, B-美国节点 ],
    }
  - {
      name: 🇸🇬 全线路新加坡优选,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      proxies: [ A-新加坡节点, B-新加坡节点 ],
    }
  # --- 服务层 ---
  - {
      name: 🤖 人工智能,
      type: select,
      proxies: [ C全线路优选, B-美国节点, 🇺🇸 全线路美国优选, B-新加坡节点, 🇸🇬 全线路新加坡优选, A-美国节点, 🚀 节点选择 ],
    }
  - {
      name: 📲 电报消息,
      type: select,
      proxies: [ C全线路优选, 🇸🇬 全线路新加坡优选, A-新加坡节点, B-新加坡节点, A-香港节点, B-香港节点, 🚀 节点选择 ],
    }
  - {
      name: 🎮 游戏服务,
      type: select,
      proxies: [ A-香港节点, A-日本节点, A-韩国节点, B-香港节点, B-日本节点, 🚀 节点选择, 🎯 全球直连 ],
    }
  - {
      name: 📈 网络测试,
      type: select,
      proxies: [ A机场全线路自动优选, B机场全线路自动优选, 🇺🇸 全线路美国优选, 🇸🇬 全线路新加坡优选, A机场常用, B机场常用, 🚀 节点选择 ],
    }
  - {
      name: 🪟 微软服务,
      type: select,
      proxies: [ 🎯 全球直连, A机场全线路自动优选, B机场全线路自动优选, A机场常用, B机场常用, 🇺🇸 全线路美国优选, 🚀 节点选择 ],
    }
  - {
      name: 🇬 谷歌服务,
      type: select,
      proxies: [ A机场全线路自动优选, B机场全线路自动优选, A机场常用, B机场常用, 🇺🇸 全线路美国优选, 🇸🇬 全线路新加坡优选, 🚀 节点选择 ],
    }
  - { name: 🍎 苹果服务, type: select, proxies: [ 🎯 全球直连, A机场全线路自动优选, B机场全线路自动优选, A机场常用, B机场常用, 🚀 节点选择 ] }

  # --- 规则承接层 ---
  - {
      name: 🪜 代理域名,
      type: select,
      proxies: [ 🚀 节点选择, 🎯 全球直连 ],
    }
  - {
      name: 🐟 漏网之鱼,
      type: select,
      proxies: [ 🚀 节点选择, 🎯 全球直连 ],
    }

  # --- 固定终端层 ---
  - { name: 🎯 全球直连, type: select, proxies: [ DIRECT ] }
  - { name: 🛑 广告拦截, type: select, proxies: [ REJECT, DIRECT ] }
  - { name: 🔒 私有网络, type: select, proxies: [ DIRECT ] }
  - { name: 🇨🇳 直连域名, type: select, proxies: [ DIRECT ] }
  - { name: 🇨🇳 直连 IP, type: select, proxies: [ DIRECT ] }

  # --- A 机场线路层：地区组 ---
  - {
      name: A-香港节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ A机场 ],
      filter: "(?i)(香港|HK|HKG|Hong Kong|HongKong)",
    }
  - {
      name: A-日本节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ A机场 ],
      filter: "(?i)(日本|JP|Japan|东京|大阪)",
    }
  - {
      name: A-韩国节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ A机场 ],
      filter: "(?i)(韩国|韩|KR|Korea|首尔)",
    }
  - {
      name: A-新加坡节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ A机场 ],
      filter: "(?i)(新加坡|狮城|坡|SG|Singapore)",
    }
  - {
      name: A-美国节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ A机场 ],
      filter: "(?i)(美国|美|US|USA|United States|America|洛杉矶|硅谷|圣何塞|西雅图|达拉斯|凤凰城|纽约|芝加哥)",
    }
  - {
      name: A-台湾节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ A机场 ],
      filter: "(?i)(台湾|TW|Taiwan|台北|新北)",
    }
  - {
      name: A-欧洲节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ A机场 ],
      filter: "(?i)(欧洲|EU|Europe|英国|UK|London|德国|DE|Germany|法国|FR|France|荷兰|NL|Nether\
        lands)",
    }
  - {
      name: A-其他地区,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ A机场 ],
      exclude-filter: "(?i)(香港|HK|HKG|Hong
        Kong|HongKong|日本|JP|Japan|东京|大阪|韩国|KR|Korea|首尔|新加坡|SG|Singapore|美国|美|US\
        |USA|United
        States|America|台湾|TW|Taiwan|台北|欧洲|EU|Europe|英国|UK|London|德国|DE|Germany|\
        法国|FR|France|荷兰|NL|Netherlands)",
    }

  # --- B 机场线路层：地区组 ---
  - {
      name: B-香港节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ B机场 ],
      filter: "(?i)(香港|HK|HKG|Hong Kong|HongKong)",
    }
  - {
      name: B-日本节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ B机场 ],
      filter: "(?i)(日本|JP|Japan|东京|大阪)",
    }
  - {
      name: B-韩国节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ B机场 ],
      filter: "(?i)(韩国|韩|KR|Korea|首尔)",
    }
  - {
      name: B-新加坡节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ B机场 ],
      filter: "(?i)(新加坡|狮城|坡|SG|Singapore)",
    }
  - {
      name: B-美国节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ B机场 ],
      filter: "(?i)(美国|美|US|USA|United States|America|洛杉矶|硅谷|圣何塞|西雅图|达拉斯|凤凰城|纽约|芝加哥)",
    }
  - {
      name: B-台湾节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ B机场 ],
      filter: "(?i)(台湾|TW|Taiwan|台北|新北)",
    }
  - {
      name: B-欧洲节点,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ B机场 ],
      filter: "(?i)(欧洲|EU|Europe|英国|UK|London|德国|DE|Germany|法国|FR|France|荷兰|NL|Nether\
        lands)",
    }
  - {
      name: B-其他地区,
      type: url-test,
      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ B机场 ],
      exclude-filter: "(?i)(香港|HK|HKG|Hong
        Kong|HongKong|日本|JP|Japan|东京|大阪|韩国|KR|Korea|首尔|新加坡|SG|Singapore|美国|美|US\
        |USA|United
