rules:
# ==================== 特定IP分流规则 ====================
#- IP-CIDR,你需要的代理IP/32,Proxy                                     #需要强制走代理的IP
#- SRC-IP-CIDR,你需要走直连的IP/32,国内直连                             #需要强制走国内的IP

# ==================== 阻止 QUIC/APP内置DOH ====================
  - AND,(DST-PORT,443),(NETWORK,UDP),(NOT,((RULE-SET,China))),REJECT
  - AND,(DST-PORT,443),(NETWORK,UDP),(NOT,((RULE-SET,China-IP))),REJECT
  - RULE-SET,DNS-IP,REJECT,no-resolve
  - RULE-SET,Category-DoH,REJECT

# --- 基础直连 ---
  - RULE-SET,Private,国内直连                      # 局域网域名直连 (路由后台/NAS)
  - RULE-SET,Private-IP,国内直连,no-resolve        # 局域网 IP 直连 (防止环路)
  - RULE-SET,HTTPDNS-CN,国内直连                   # HTTPDNS 直连 (防止 CDN 误判)

# ==================== 独立/特定分流规则 ====================
  # --- PikPak (屏蔽地区检测/直连下载) ---
  - DOMAIN,access.pikpakdrive.com,REJECT
  - DOMAIN,access.mypikpak.com,REJECT
  - DOMAIN,access.mypikpak.net,REJECT
  - DOMAIN,access.pikpak.me,REJECT
  - DOMAIN-KEYWORD,dl-a10b-,国内直连
  - DOMAIN-KEYWORD,dl-z01a-,国内直连
  - DOMAIN-REGEX,^dl-[A-Za-z0-9-]+\.mypikpak\.com$,国内直连
 
# --- BT/PT 下载 ---
