# === 锚点配置 ====
# 节点筛选正则表达式 - 基于地理位置和关键词过滤
BaseProvider: &BaseProvider { type: http, interval: 86400, proxy: 国内直连, health-check: {enable: true, url: 'https://cp.cloudflare.com/generate_204', interval: 180}, header: {User-Agent: ['clash.meta', 'mihomo/1.9.22']}, override: {skip-cert-verify: true, udp: true},
 exclude-filter: '(?i)(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|剩余|重置|套餐|距离)' }


# 策略组基础配置模板
BaseST:   &BaseST   { type: smart,        interval: 60, lazy: true, url: 'https://cp.cloudflare.com/generate_204', hidden: true, uselightgbm: true }
BaseFB:   &BaseFB   { type: fallback,     interval: 60, lazy: true, url: 'https://cp.cloudflare.com/generate_204', hidden: true }
BaseSL:   &BaseSL   { type: select,       interval: 60, lazy: true, url: 'https://cp.cloudflare.com/generate_204' }
BaseLB:   &BaseLB   { type: load-balance, interval: 60, lazy: true, url: 'https://cp.cloudflare.com/generate_204' }

# 策略组代理列表锚点
SelectAL: &SelectAL { type: select, proxies: [香港-故转, 香港-智能, 日本-故转, 日本-智能, 狮城-故转, 狮城-智能, 美国-故转, 美国-智能, 台湾-故转, 台湾-智能, 低倍率-故转, 高倍率-手选, 冷门节点-手选, 全部节点-手选, 国内直连] } # 全部节点组
OneSmart: &OneSmart { type: select, proxies: [香港-智能, 日本-智能, 狮城-智能, 台湾-智能, 美国-智能, 低倍率-智能, 冷门节点-智能, 全部节点-手选, 国内直连] } # 智能节点组
SelectHQ: &SelectHQ { type: select, proxies: [香港-手选, 日本-手选, 狮城-手选, 台湾-手选, 美国-手选, 低倍率-手选, 冷门节点-手选, 全部节点-手选, 国内直连] } # 手选节点组 
SelectFB: &SelectFB { type: select, proxies: [香港-故转, 日本-故转, 狮城-故转, 台湾-故转, 美国-故转, 低倍率-故转, 全部节点-手选, 国内直连] } # 故转节点组 
SelectLR: &SelectLR { type: select, proxies: [国内直连, 低倍率-故转, 全部节点-手选] } # 低倍率节点组
SelectHR: &SelectHR { type: select, proxies: [国内直连, 高倍率-手选, 全部节点-手选] } # 高倍率节点组
SelectDC: &SelectDC { type: select, proxies: [国内直连, 全部节点-手选] } # 国内直连

# 节点筛选正则表达式
# --- 全部/冷门节点 ---
FilterAL: &FilterAL { filter: '^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)).*$', icon: 'https://github.com/Koolson/Qure/raw/master/IconSet/Color/Global.png' }
FilterEU: &FilterEU { filter: '^(?i)(?!.*(🇭🇰|香港|hong\s?kong|HK[-_ ]?\d*|🇸🇬|新加坡|singapore|SG[-_ ]?\d*|🇯🇵|日本|japan|JP[-_ ]?\d*|🇹🇼|台湾|taiwan|TW[-_ ]?\d*|🇺🇸|美国|united\s?states|usa|US[-_ ]?\d*|剩余|重置|套餐|距离|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入)).*$', icon: 'https://github.com/Koolson/Qure/raw/master/IconSet/Color/European_Union.png' } 

# --- 倍率筛选节点 ---
FilterHR: &FilterHR { filter: '^(?i).*(?<![0-9.])(x(1\.[5-9]\d*|[2-9](\.\d+)?|10(\.0+)?)|(1\.[5-9]\d*|[2-9](\.\d+)?|10(\.0+)?|高级)x).*$', icon: 'https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin.png' } # 高倍率节点
FilterLR: &FilterLR { filter: '^(?i).*(0\.01|0\.[1-8]|下载|实验).*$', icon: 'https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin_1.png' } # 低倍率节点

# --- 常用地区节点 ---
FilterUS: &FilterUS { filter: '^(?i)(?!.*南美).*(美|🇺🇸|united\s?states|(?<![a-zA-Z])(US[-_ ]?\d*|USA)|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD).*$', icon: 'https://github.com/Koolson/Qure/raw/master/IconSet/Color/United_States.png' }
FilterTW: &FilterTW { filter: '^(?i)(?!.*(烟台|平台)).*(台|🇼🇸|🇹🇼|TW|TW[-_ ]?\d*|tai|TPE|TSA|KHH).*$', icon: 'https://github.com/Koolson/Qure/raw/master/IconSet/Color/Taiwan.png' }
FilterJP: &FilterJP { filter: '^(?i)(?!.*尼日).*(日|🇯🇵|JP|JP[-_ ]?\d*|Japan|NRT|HND|KIX|CTS|FUK).*$', icon: 'https://github.com/Koolson/Qure/raw/master/IconSet/Color/Japan.png' }
FilterSG: &FilterSG { filter: '^(?i).*(坡|🇸🇬|Sing|SIN|SG[-_ ]?\d*|XSP).*$', icon: 'https://github.com/Koolson/Qure/raw/master/IconSet/Color/Singapore.png' }
FilterHK: &FilterHK { filter: '^(?i).*(港|🇭🇰|Hong|HKG|HK[-_ ]?\d*).*$', icon: 'https://github.com/Koolson/Qure/raw/master/IconSet/Color/Hong_Kong.png' }

# Smart 优先级权重
PriorityLR: &PriorityLR ['0.01:8', '0.1:7', '0.2:6', '实验:6', '0.3:5', '0.4:4', '0.5:3', '0.6:2', '0.7:1', '0.8:0.5'] # 低倍率优先级
PriorityNR: &PriorityNR ['优:3', '中:2', '次:1', '备:0.5'] # 按订阅质量排序优先级

# 规则集行为模板
RuleIntv: &RuleIntv 86400  # 外部规则统一更新时间
DmnMrs: &DmnMrs { type: http, behavior: domain,    format: mrs,  interval: *RuleIntv }
DmnYml: &DmnYml { type: http, behavior: domain,    format: yaml, interval: *RuleIntv }
IpcMrs: &IpcMrs { type: http, behavior: ipcidr,    format: mrs,  interval: *RuleIntv }
ClsTxt: &ClsTxt { type: http, behavior: classical, format: text, interval: *RuleIntv }
ClsYml: &ClsYml { type: http, behavior: classical, format: yaml, interval: *RuleIntv }
# 命名逻辑：Dmn=Domain, Ipc=IPCIDR, Cls=Classical | Mrs=MRS, Yml=YAML, Txt=Text


# ==================== 机场订阅链接 =====================
proxy-providers:

  #优质订阅源 - 优质节点集合，使用时请修改
  优质服务商: {<<: *BaseProvider, url: '填写你的优质机场订阅链接', override: {additional-suffix: ' [优]'}}

  # 次优质订阅源 - 次优节点集合，使用时请修改
  次优服务商: {<<: *BaseProvider, url: '填写你的次优质机场订阅链接', override: {additional-suffix: ' [次]'}}

  # 备用订阅源 - 次优节点集合，使用时请修改
  备用服务商: {<<: *BaseProvider, url: '填写你的备用机场订阅链接', override: {additional-suffix: ' [备]'}}

  # 落地订阅源 - 落地服务连接，使用时请修改
  落地服务商: {<<: *BaseProvider, url: '填写你的落地订阅源地址', override: {additional-suffix: ' [中]', dialer-proxy: 中转服务}}
  

# ==================== 自建代理节点 =====================
proxies:



# ====================   核心配置   =====================
# 基础配置
mode: rule                                # 运行模式：规则模式 (Global/Rule/Direct)
port: 7890                                # HTTP 代理端口
socks-port: 7891                          # SOCKS5 代理端口
redir-port: 7892                          # Redir 端口 (透明代理用)
mixed-port: 7893                          # 混合端口 (HTTP + SOCKS5)
tproxy-port: 7895                         # TProxy 端口 (Linux/安卓透明代理用)
ipv6: true                                # 开启 IPv6 支持
allow-lan: true                           # 允许局域网连接
bind-address: '*'                         # 绑定地址 (* 代表所有网卡)
find-process-mode: 'always'               # 进程匹配模式
log-level: warning                        # 日志级别

#TCP 连接
unified-delay: true                       # 开启统一延迟 (计算 HTTP 响应时间)
tcp-concurrent: true                      # 开启 TCP 并发连接
disable-keep-alive: false                 # 开启长连接
keep-alive-interval: 15                   # TCP 保活间隔
keep-alive-idle: 600                      # TCP 空闲等待 

# 认证配置
authentication:
  - mihomo:yyds666                        # 账号:密码 (连接代理时需要验证)

skip-auth-prefixes:                       # 免密 IP 段 (局域网内免输密码)
  - 192.168.1.0/24                        
  - 127.0.0.1/8                           
  - 100.64.1.0/24          
  - 10.144.1.0/24                      

# 实验性功能
experimental:
  quic-go-disable-gso: true               # 禁用 GSO (解决部分 OpenWrt 固件的 UDP 兼容性问题)  
     
# 管理面板配置
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard               # 面板名称
external-ui: ui                           # 面板安装目录
external-controller: 0.0.0.0:9090         # API 监听端口 (面板连接端口)
secret: yyds666                           # API 密钥 (面板连接密码)

# 配置存储
profile:
  store-selected: true                    # 保存选择  选择的节点/策略组
  store-fake-ip: true                     # 保存选择 Fake-IP 映射表 (加速二次加载)

# 流量嗅探
sniffer:
  enable: true                            # 开启用嗅探功能
  override-destination: true              # 使用嗅探结果覆盖连接目标（推荐开启）
  sniff:                                  # 嗅探协议配置
    QUIC:                                 # QUIC 协议嗅探（HTTP/3）
      ports: [443, 8443]
    TLS:                                  # TLS 协议嗅探（HTTPS）
      ports: [443, 8443]
    HTTP:                                 # HTTP 协议嗅探
      ports: [80, 8080-8880]
  force-domain:                           # 强制嗅探识别的域名
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"   # Disney+
    - "+.hbo.com"
    - "+.hbomaxcdn.com"
    - "+.tiktok.com"
  skip-domain:                             # 跳过嗅探的域名 (白名单：防止误杀/断流)
    - "Mijia Cloud"
    - dlg.io.mi.com
    - "+.push.apple.com"
    - "+.oray.com"      # 向日葵
    - "+.sunlogin.net"
    - "+.crashlytics.com"
  parse-pure-ip: true                      # 嗅探纯 IP (强制对 IP 进行反向探测)
  force-dns-mapping: true                  # 强制 DNS 映射 (从 Fake-IP 还原域名)

# TUN模式配置
tun:
  enable: true                             # 开启 TUN 模式
  stack: mixed                             # 协议栈：mixed (混合) / system / gvisor
  dns-hijack:                              # DNS 劫持 (强制接管设备 DNS 查询)
    - "any:53"                             # 劫持所有 UDP 53
    - "tcp://any:53"                       # 劫持所有 TCP 53
  auto-route: true                         # 自动配置路由表
  auto-detect-interface: true              # 自动检测网络接口
  auto-redirect: true                      # 自动配置 iptables 重定向
  endpoint-independent-nat: true           # 独立 NAT (Full Cone)，优化游戏/P2P 

# DNS配置
dns:
  enable: true                             # 启用内置 DNS 服务器
  listen: 0.0.0.0:7874                     # DNS 监听端口 (OpenClash 转发目标)
  ipv6: true                               # 启用 IPv6 解析
  enhanced-mode: fake-ip                   # 模式：fake-ip，redir-host
  fake-ip-range: 198.18.0.1/16             # Fake-IP 地址池范围（私有地址段，不会与真实 IP 冲突）
  default-nameserver:                      # 用于解析下方 nameserver 中 DoH/DoT 的域名
    - tls://223.5.5.5
    - tls://1.12.12.12
    - 180.184.1.1
    - 114.114.114.114
  nameserver:                              # 主 DNS 服务器列表（用于实际域名解析）        
    - https://dns.alidns.com/dns-query#h3=true

  fake-ip-filter:
  - rule-set:fakeip-filter                 # Fake-IP 过滤列表（这些域名将返回真实 IP 而非 Fake-IP）
  - rule-set:Private
  - rule-set:China
  - rule-set:Trackers
  - "+.lan"
  - "+.local"
  - "checkip.dyndns.org"
  - "connectivitycheck.gstatic.com"
  - "+.push.apple.com"
  - "time.nist.gov"
  - "time.windows.com"
  - "+.battlenet.com"
  - "+.blzstatic.cn"
  - "+.nintendo.net"
  - "+.xboxlive.com"
  - "+.stun.playstation.net"
  - "+.docker.io"
  - "+.miwifi.com"
  - "+.stun.*"

  fake-ip-filter-mode: blacklist           # Fake-IP 过滤模式：blacklist（黑名单）/ whitelist（白名单）
  respect-rules: false                     # 是否遵循规则（false 表示所有 DNS 查询都通过直连查询，不经过代理规则）


# ==================== 代理策略组 ====================
proxy-groups:
  # 应用策略层 - Select手动选择，支持多场景应用优化，使用时默认，也可修改
