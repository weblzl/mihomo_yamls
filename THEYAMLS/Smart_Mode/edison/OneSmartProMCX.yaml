  - DOMAIN-KEYWORD,bittorrent,Tracker
  - DOMAIN-KEYWORD,torrent,Tracker
  - DOMAIN-KEYWORD,tracker,Tracker
  - RULE-SET,PublicTracker,Tracker
  - RULE-SET,Trackers,Tracker
