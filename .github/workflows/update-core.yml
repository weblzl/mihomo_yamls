          - { name: windows-arm64,          goos: windows, goarch: arm64 }
      fail-fast: false
    env:
      GOOS:        ${{ matrix.goos }}
      GOARCH:      ${{ matrix.goarch }}
      GOAMD64:     ${{ matrix.goamd64 }}
      GOARM:       ${{ matrix.goarm }}
      GOMIPS:      ${{ matrix.gomips }}
      CGO_ENABLED: 0
      VERSION:     ${{ needs.sagernet_test_version.outputs.version }}
      TAGS:        ${{ needs.sagernet_test_version.outputs.tags }}
    steps:
      - name: Checkout SagerNet/sing-box (dev)
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.go.outputs.go_version }}
          cache: false

      - name: Build
        run: |
          go build -v -trimpath \
            -ldflags "-checklinkname=0 -X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' -s -w -buildid=" \
            -tags "${TAGS}" \
            -o sing-box${{ matrix.goos == 'windows' && '.exe' || '' }} \
            ./cmd/sing-box

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-sagernet-test-${{ matrix.name }}
          path: sing-box*
          retention-days: 1

# ============================================================
# 阶段四：下载 mihomo 二进制
# ============================================================

  download_mihomo_meta:
    name: 下载 mihomo Meta
    runs-on: ubuntu-latest
    needs: [mihomo_meta_version]
    if: needs.mihomo_meta_version.outputs.skip_update != 'true'
    env:
      VERSION:  ${{ needs.mihomo_meta_version.outputs.version }}
      BASE_URL: https://github.com/MetaCubeX/mihomo/releases/download
    steps:
      - name: 下载并整理
        run: |
          mkdir -p ./mihomo ./tmp

          linux_archs=(amd64-v1 amd64-v3 armv5 armv6 armv7 arm64 mips-softfloat mipsle-softfloat mipsle-hardfloat)
          for arch in "${linux_archs[@]}"; do
            echo "下载 linux-${arch}"
            curl -fsSL "${BASE_URL}/${VERSION}/mihomo-linux-${arch}-${VERSION}.gz" \
              | gunzip -c > "./mihomo/mihomo-meta-linux-${arch}.upx"
            chmod +x "./mihomo/mihomo-meta-linux-${arch}.upx"
          done

          windows_archs=(amd64-v1 amd64-v3 arm64)
          for arch in "${windows_archs[@]}"; do
            echo "下载 windows-${arch}"
            curl -fsSL "${BASE_URL}/${VERSION}/mihomo-windows-${arch}-${VERSION}.zip" -o ./tmp/win.zip
            unzip -q -o ./tmp/win.zip -d ./tmp/win/
            mv -f "./tmp/win/mihomo-windows-${arch}.exe" "./mihomo/mihomo-meta-windows-${arch}.exe"
            rm -rf ./tmp/win ./tmp/win.zip
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-meta-files
          path: ./mihomo/*
          retention-days: 1

  download_mihomo_alpha:
    name: 下载 mihomo Alpha
    runs-on: ubuntu-latest
    needs: [mihomo_alpha_version]
    if: needs.mihomo_alpha_version.outputs.skip_update != 'true'
    env:
      VERSION:  ${{ needs.mihomo_alpha_version.outputs.version }}
      BASE_URL: https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha
    steps:
      - name: 下载并整理
        run: |
          mkdir -p ./mihomo ./tmp

          linux_archs=(amd64-v1 amd64-v3 armv5 armv6 armv7 arm64 mips-softfloat mipsle-softfloat mipsle-hardfloat)
          for arch in "${linux_archs[@]}"; do
            echo "下载 linux-${arch}"
            curl -fsSL "${BASE_URL}/mihomo-linux-${arch}-${VERSION}.gz" \
              | gunzip -c > "./mihomo/mihomo-alpha-linux-${arch}.upx"
            chmod +x "./mihomo/mihomo-alpha-linux-${arch}.upx"
          done

          windows_archs=(amd64-v1 amd64-v3 arm64)
          for arch in "${windows_archs[@]}"; do
            echo "下载 windows-${arch}"
            curl -fsSL "${BASE_URL}/mihomo-windows-${arch}-${VERSION}.zip" -o ./tmp/win.zip
            unzip -q -o ./tmp/win.zip -d ./tmp/win/
            mv -f "./tmp/win/mihomo-windows-${arch}.exe" "./mihomo/mihomo-alpha-windows-${arch}.exe"
            rm -rf ./tmp/win ./tmp/win.zip
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-alpha-files
          path: ./mihomo/*
          retention-days: 1

  download_mihomo_smart:
    name: 下载 mihomo Smart
    runs-on: ubuntu-latest
    needs: [mihomo_smart_version]
    if: needs.mihomo_smart_version.outputs.skip_update != 'true'
    env:
      VERSION:  ${{ needs.mihomo_smart_version.outputs.version }}
      BASE_URL: https://github.com/vernesong/mihomo/releases/download/Prerelease-Alpha
    steps:
      - name: 下载并整理
        run: |
          mkdir -p ./mihomo ./tmp
          set +e  # Smart 版本部分平台可能不存在，允许单个失败

          linux_archs=(amd64-v1 amd64-v3 armv5 armv6 armv7 arm64 mips-softfloat mipsle-softfloat mipsle-hardfloat)
          for arch in "${linux_archs[@]}"; do
            echo "下载 linux-${arch}"
            curl -fsSL "${BASE_URL}/mihomo-linux-${arch}-${VERSION}.gz" \
              | gunzip -c > "./mihomo/mihomo-smart-linux-${arch}.upx"
            if [[ $? -eq 0 && -s "./mihomo/mihomo-smart-linux-${arch}.upx" ]]; then
              chmod +x "./mihomo/mihomo-smart-linux-${arch}.upx"
            else
              echo "  ⚠️  跳过: linux-${arch}"
              rm -f "./mihomo/mihomo-smart-linux-${arch}.upx"
            fi
          done

          windows_archs=(amd64-v1 amd64-v3 arm64)
          for arch in "${windows_archs[@]}"; do
            echo "下载 windows-${arch}"
            curl -fsSL "${BASE_URL}/mihomo-windows-${arch}-${VERSION}.zip" -o ./tmp/win.zip
            if [[ $? -eq 0 && -s ./tmp/win.zip ]]; then
              unzip -q -o ./tmp/win.zip -d ./tmp/win/ && \
                mv -f "./tmp/win/mihomo-windows-${arch}.exe" "./mihomo/mihomo-smart-windows-${arch}.exe" || true
              rm -rf ./tmp/win ./tmp/win.zip
            else
              echo "  ⚠️  跳过: windows-${arch}"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-smart-files
          path: ./mihomo/*
          retention-days: 1
        if: hashFiles('./mihomo/*') != ''

# ============================================================
# 阶段五：收集、UPX 压缩、推送 core 分支、更新 Release
# ============================================================
  publish:
    name: 发布
    runs-on: ubuntu-latest
    if: always()
    needs:
      - ref1nd_stable_version
      - ref1nd_test_version
      - sagernet_stable_version
      - sagernet_test_version
      - mihomo_meta_version
      - mihomo_alpha_version
      - mihomo_smart_version
      - build_ref1nd_stable
      - build_ref1nd_test
      - build_sagernet_stable
      - build_sagernet_test
      - download_mihomo_meta
      - download_mihomo_alpha
      - download_mihomo_smart
    env:
      REF1ND_STABLE_VER:    ${{ needs.ref1nd_stable_version.outputs.version }}
      REF1ND_STABLE_TIME:   ${{ needs.ref1nd_stable_version.outputs.time }}
      REF1ND_STABLE_SKIP:   ${{ needs.ref1nd_stable_version.outputs.skip_update }}
      REF1ND_TEST_VER:      ${{ needs.ref1nd_test_version.outputs.version }}
      REF1ND_TEST_TIME:     ${{ needs.ref1nd_test_version.outputs.time }}
      REF1ND_TEST_SKIP:     ${{ needs.ref1nd_test_version.outputs.skip_update }}
      SAGERNET_STABLE_VER:  ${{ needs.sagernet_stable_version.outputs.version }}
      SAGERNET_STABLE_TIME: ${{ needs.sagernet_stable_version.outputs.time }}
      SAGERNET_STABLE_SKIP: ${{ needs.sagernet_stable_version.outputs.skip_update }}
      SAGERNET_TEST_VER:    ${{ needs.sagernet_test_version.outputs.version }}
      SAGERNET_TEST_TIME:   ${{ needs.sagernet_test_version.outputs.time }}
      SAGERNET_TEST_SKIP:   ${{ needs.sagernet_test_version.outputs.skip_update }}
      META_VER:    ${{ needs.mihomo_meta_version.outputs.version }}
      META_TIME:   ${{ needs.mihomo_meta_version.outputs.time }}
      META_SKIP:   ${{ needs.mihomo_meta_version.outputs.skip_update }}
      ALPHA_VER:   ${{ needs.mihomo_alpha_version.outputs.version }}
      ALPHA_TIME:  ${{ needs.mihomo_alpha_version.outputs.time }}
      ALPHA_SKIP:  ${{ needs.mihomo_alpha_version.outputs.skip_update }}
      SMART_VER:   ${{ needs.mihomo_smart_version.outputs.version }}
      SMART_TIME:  ${{ needs.mihomo_smart_version.outputs.time }}
      SMART_SKIP:  ${{ needs.mihomo_smart_version.outputs.skip_update }}

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: 下载所有产物
        uses: actions/download-artifact@v8
        with:
          path: ./tmp

      - name: 检查是否有新产物
        id: check
        run: |
          count=$(find ./tmp -type f 2>/dev/null | wc -l)
          if [[ "$count" -gt 0 ]]; then
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
            echo "发现 ${count} 个产物文件"
            find ./tmp -type f | sort
          else
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
            echo "没有新产物，所有变体均已是最新"
          fi

      # ---- 整理 sing-box ----
      - name: 整理 sing-box 产物
        if: steps.check.outputs.has_artifacts == 'true'
        run: |
          mkdir -p ./sing-box

          move_sb() {
            local variant="$1"
            local skip="$2"
            [[ "$skip" == "true" ]] && return

            local linux_archs=(amd64-v1 amd64-v3 armv5 armv6 armv7 arm64 mips-softfloat mipsle-softfloat mipsle-hardfloat)
            for arch in "${linux_archs[@]}"; do
              src="./tmp/sing-box-${variant}-linux-${arch}/sing-box"
              if [[ -f "$src" ]]; then
                dest="./sing-box/sing-box-${variant}-linux-${arch}.upx"
                mv -f "$src" "$dest"
                chmod +x "$dest"
                echo "  ✅ $dest"
              fi
            done

            local windows_archs=(amd64-v1 amd64-v3 arm64)
            for arch in "${windows_archs[@]}"; do
              src="./tmp/sing-box-${variant}-windows-${arch}/sing-box.exe"
              if [[ -f "$src" ]]; then
                dest="./sing-box/sing-box-${variant}-windows-${arch}.exe"
                mv -f "$src" "$dest"
                echo "  ✅ $dest"
              fi
            done
          }

          move_sb "ref1nd-stable"   "$REF1ND_STABLE_SKIP"
          move_sb "ref1nd-test"     "$REF1ND_TEST_SKIP"
          move_sb "sagernet-stable" "$SAGERNET_STABLE_SKIP"
          move_sb "sagernet-test"   "$SAGERNET_TEST_SKIP"

      # ---- 整理 mihomo ----
      - name: 整理 mihomo 产物
        if: steps.check.outputs.has_artifacts == 'true'
        run: |
          mkdir -p ./mihomo

          for item in "meta:${META_SKIP}" "alpha:${ALPHA_SKIP}" "smart:${SMART_SKIP}"; do
            variant="${item%%:*}"
            skip="${item##*:}"
            [[ "$skip" == "true" ]] && continue
            src="./tmp/mihomo-${variant}-files"
            if [[ -d "$src" ]]; then
              mv -f "${src}"/* ./mihomo/ 2>/dev/null || true
              echo "  ✅ mihomo-${variant} 已整理"
            fi
          done

      # ---- UPX 压缩 ----
      - name: Setup UPX 并压缩
        if: steps.check.outputs.has_artifacts == 'true'
        uses: crazy-max/ghaction-upx@v4
        with:
          version: latest
          files: |
            ./sing-box/*.upx
            ./mihomo/*.upx

      # ---- 推送 core 分支 ----
      - name: 推送到 core 分支
        if: steps.check.outputs.has_artifacts == 'true'
        run: |
          mkdir -p ./publish/sing-box ./publish/mihomo
          [[ "$(ls -A ./sing-box 2>/dev/null)" ]] && cp -r ./sing-box/. ./publish/sing-box/
          [[ "$(ls -A ./mihomo  2>/dev/null)" ]] && cp -r ./mihomo/.  ./publish/mihomo/

          find ./publish -type f \( -name "*.upx" -o -name "*.exe" \) \
            -exec sha256sum {} \; | sort > ./publish/checksums.txt

          cd ./publish
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b core
          git add .
          git commit -m "Update Cores: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin core

      # ---- 发布 sing-box Release ----
      - name: 发布 sing-box Release
        if: |
          steps.check.outputs.has_artifacts == 'true' &&
          (env.REF1ND_STABLE_SKIP != 'true' || env.REF1ND_TEST_SKIP != 'true' ||
           env.SAGERNET_STABLE_SKIP != 'true' || env.SAGERNET_TEST_SKIP != 'true')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: sing-box
          tag: sing-box
          overwrite: true
          file_glob: true
          file: ./sing-box/*
          body: |
            更新 [sing-box reF1nd-Stable](https://github.com/reF1nd/sing-box/tree/reF1nd-stable) 至 v${{ env.REF1ND_STABLE_VER }}，发布于 ${{ env.REF1ND_STABLE_TIME }}
            更新 [sing-box reF1nd-Test](https://github.com/reF1nd/sing-box/tree/reF1nd-testing) 至 v${{ env.REF1ND_TEST_VER }}，发布于 ${{ env.REF1ND_TEST_TIME }}
            更新 [sing-box SagerNet-Stable](https://github.com/SagerNet/sing-box/tree/main) 至 v${{ env.SAGERNET_STABLE_VER }}，发布于 ${{ env.SAGERNET_STABLE_TIME }}
            更新 [sing-box SagerNet-Test](https://github.com/SagerNet/sing-box/tree/dev) 至 v${{ env.SAGERNET_TEST_VER }}，发布于 ${{ env.SAGERNET_TEST_TIME }}

      # ---- 发布 mihomo Release ----
      - name: 发布 mihomo Release
        if: |
          steps.check.outputs.has_artifacts == 'true' &&
          (env.META_SKIP != 'true' || env.ALPHA_SKIP != 'true' || env.SMART_SKIP != 'true')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: mihomo
          tag: mihomo
          overwrite: true
          file_glob: true
          file: ./mihomo/*
          body: |
            更新 [mihomo Meta](https://github.com/MetaCubeX/mihomo/tree/Meta) 至 ${{ env.META_VER }}，发布于 ${{ env.META_TIME }}
            更新 [mihomo Alpha](https://github.com/MetaCubeX/mihomo/tree/Alpha) 至 ${{ env.ALPHA_VER }}，发布于 ${{ env.ALPHA_TIME }}
            更新 [mihomo Smart](https://github.com/vernesong/mihomo) 至 ${{ env.SMART_VER }}，发布于 ${{ env.SMART_TIME }}

      - name: 清理旧 Workflow 记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 1
