          echo "time=$(curl -sSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.published_at // .created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "tags=with_gvisor,with_quic,with_dhcp,with_utls,with_clash_api" >> $GITHUB_OUTPUT

      - name: 版本比对
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          ver="${{ steps.version.outputs.version }}"
          t="${{ steps.version.outputs.time }}"
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            echo "skip_update=false" >> $GITHUB_OUTPUT
          elif echo "${current_body}" | grep -q "SagerNet-Stable.*${ver}.*${t}"; then
            echo "已是最新 SagerNet-Stable ${ver}，跳过"
            echo "skip_update=true" >> $GITHUB_OUTPUT
          else
            echo "需要更新 SagerNet-Stable → ${ver}"
            echo "skip_update=false" >> $GITHUB_OUTPUT
          fi

  # ---------- sing-box SagerNet-Test ----------
  sagernet_test_version:
    name: 检测 sing-box SagerNet-Test 版本
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.projects == 'all' ||
