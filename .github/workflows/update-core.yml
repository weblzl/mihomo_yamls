          fi

# ============================================================
# 阶段三：构建 sing-box（内联矩阵，正确分支名）
# ============================================================

  build_ref1nd_stable:
    name: 构建 sing-box reF1nd-Stable (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [go, ref1nd_stable_version]
    if: needs.ref1nd_stable_version.outputs.skip_update != 'true'
    strategy:
      matrix:
        include:
          - { name: linux-amd64-v1,         goos: linux,   goarch: amd64,  goamd64: v1 }
          - { name: linux-amd64-v3,         goos: linux,   goarch: amd64,  goamd64: v3 }
          - { name: linux-armv5,            goos: linux,   goarch: arm,    goarm: "5" }
          - { name: linux-armv6,            goos: linux,   goarch: arm,    goarm: "6" }
          - { name: linux-armv7,            goos: linux,   goarch: arm,    goarm: "7" }
          - { name: linux-arm64,            goos: linux,   goarch: arm64 }
          - { name: linux-mips-softfloat,   goos: linux,   goarch: mips,   gomips: softfloat }
          - { name: linux-mipsle-softfloat, goos: linux,   goarch: mipsle, gomips: softfloat }
          - { name: linux-mipsle-hardfloat, goos: linux,   goarch: mipsle, gomips: hardfloat }
          - { name: windows-amd64-v1,       goos: windows, goarch: amd64,  goamd64: v1 }
          - { name: windows-amd64-v3,       goos: windows, goarch: amd64,  goamd64: v3 }
          - { name: windows-arm64,          goos: windows, goarch: arm64 }
      fail-fast: false
    env:
      GOOS:        ${{ matrix.goos }}
      GOARCH:      ${{ matrix.goarch }}
      GOAMD64:     ${{ matrix.goamd64 }}
      GOARM:       ${{ matrix.goarm }}
      GOMIPS:      ${{ matrix.gomips }}
      CGO_ENABLED: 0
      VERSION:     ${{ needs.ref1nd_stable_version.outputs.version }}
      TAGS:        ${{ needs.ref1nd_stable_version.outputs.tags }}
    steps:
      - name: Checkout reF1nd/sing-box (reF1nd-stable)
        uses: actions/checkout@v4
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.go.outputs.go_version }}
          cache: false

      - name: Build
        run: |
          go build -v -trimpath \
            -ldflags "-checklinkname=0 -X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' -s -w -buildid=" \
            -tags "${TAGS}" \
            -o sing-box${{ matrix.goos == 'windows' && '.exe' || '' }} \
            ./cmd/sing-box

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-ref1nd-stable-${{ matrix.name }}
          path: sing-box*
          retention-days: 1

  build_ref1nd_test:
    name: 构建 sing-box reF1nd-Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [go, ref1nd_test_version]
    if: needs.ref1nd_test_version.outputs.skip_update != 'true'
    strategy:
      matrix:
        include:
          - { name: linux-amd64-v1,         goos: linux,   goarch: amd64,  goamd64: v1 }
          - { name: linux-amd64-v3,         goos: linux,   goarch: amd64,  goamd64: v3 }
          - { name: linux-armv5,            goos: linux,   goarch: arm,    goarm: "5" }
          - { name: linux-armv6,            goos: linux,   goarch: arm,    goarm: "6" }
          - { name: linux-armv7,            goos: linux,   goarch: arm,    goarm: "7" }
          - { name: linux-arm64,            goos: linux,   goarch: arm64 }
          - { name: linux-mips-softfloat,   goos: linux,   goarch: mips,   gomips: softfloat }
          - { name: linux-mipsle-softfloat, goos: linux,   goarch: mipsle, gomips: softfloat }
          - { name: linux-mipsle-hardfloat, goos: linux,   goarch: mipsle, gomips: hardfloat }
          - { name: windows-amd64-v1,       goos: windows, goarch: amd64,  goamd64: v1 }
          - { name: windows-amd64-v3,       goos: windows, goarch: amd64,  goamd64: v3 }
          - { name: windows-arm64,          goos: windows, goarch: arm64 }
