    outputs:
      version:     ${{ steps.version.outputs.version }}
      time:        ${{ steps.version.outputs.time }}
      tags:        ${{ steps.version.outputs.tags }}
      skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: 获取版本
        id: version
        run: |
          echo "version=$(curl -sSL https://api.github.com/repos/SagerNet/sing-box/releases | jq -r '[.[] | select(.tag_name | test("alpha|beta|rc"))][0].tag_name' | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "time=$(curl -sSL https://api.github.com/repos/SagerNet/sing-box/releases | jq -r '[.[] | select(.tag_name | test("alpha|beta|rc"))][0] | (.published_at // .created_at)' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "tags=with_gvisor,with_quic,with_dhcp,with_utls,with_clash_api" >> $GITHUB_OUTPUT

      - name: 版本比对
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          ver="${{ steps.version.outputs.version }}"
          t="${{ steps.version.outputs.time }}"
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
