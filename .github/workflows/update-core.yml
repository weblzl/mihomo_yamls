          echo "time=$(curl -sSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.published_at // .created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 版本比对
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/mihomo" | jq -r '.body // ""')
          ver="${{ steps.version.outputs.version }}"
          t="${{ steps.version.outputs.time }}"
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            echo "skip_update=false" >> $GITHUB_OUTPUT
          elif echo "${current_body}" | grep -q "mihomo Meta.*${ver}.*${t}"; then
