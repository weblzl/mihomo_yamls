name: Update Core

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      projects:
        description: '要更新的项目 (sing-box / mihomo / all)'
        required: false
        default: 'all'
      force_update:
        description: '强制更新（忽略版本检查）'
        required: false
        type: boolean
        default: false

  schedule:
    - cron: "0 18 * * *"

  push:
    branches:
      - main
    paths:
      # 只监听 workflow 文件本身，脚本变动不触发构建
      - '.github/workflows/update-core.yml'

# ============================================================
# 阶段一：获取 Go 版本
# ============================================================
jobs:
  go:
    name: 获取 Go 版本
    runs-on: ubuntu-latest
    outputs:
      go_version: ${{ steps.go.outputs.version }}
    steps:
      - name: Get latest Go version
        id: go
        run: |
          echo "version=$(curl -sSL https://raw.githubusercontent.com/actions/go-versions/update-versions-manifest-file/versions-manifest.json | jq -r '.[0].version')" >> $GITHUB_OUTPUT

# ============================================================
# 阶段二：各变体版本检测
# ============================================================

  # ---------- sing-box reF1nd-Stable ----------
  ref1nd_stable_version:
    name: 检测 sing-box reF1nd-Stable 版本
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.projects == 'all' ||
      github.event.inputs.projects == 'sing-box' ||
      github.event_name != 'workflow_dispatch'
    outputs:
      version:     ${{ steps.version.outputs.version }}
      time:        ${{ steps.version.outputs.time }}
      tags:        ${{ steps.version.outputs.tags }}
      skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: 获取版本
        id: version
        run: |
          echo "version=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases/latest | jq -r '.tag_name' | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "time=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases/latest | jq -r '.published_at // .created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "tags=with_gvisor,with_quic,with_dhcp,with_utls,with_clash_api" >> $GITHUB_OUTPUT

      - name: 版本比对
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          ver="${{ steps.version.outputs.version }}"
          t="${{ steps.version.outputs.time }}"
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            echo "skip_update=false" >> $GITHUB_OUTPUT
          elif echo "${current_body}" | grep -q "reF1nd-Stable.*${ver}.*${t}"; then
            echo "已是最新 reF1nd-Stable ${ver}，跳过"
            echo "skip_update=true" >> $GITHUB_OUTPUT
          else
            echo "需要更新 reF1nd-Stable → ${ver}"
            echo "skip_update=false" >> $GITHUB_OUTPUT
          fi

  # ---------- sing-box reF1nd-Test ----------
  ref1nd_test_version:
    name: 检测 sing-box reF1nd-Test 版本
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.projects == 'all' ||
      github.event.inputs.projects == 'sing-box' ||
      github.event_name != 'workflow_dispatch'
    outputs:
      version:     ${{ steps.version.outputs.version }}
      time:        ${{ steps.version.outputs.time }}
      tags:        ${{ steps.version.outputs.tags }}
      skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: 获取版本
        id: version
        run: |
          echo "version=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases | jq -r '[.[] | select(.tag_name | test("alpha|beta|rc"))][0].tag_name' | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "time=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases | jq -r '[.[] | select(.tag_name | test("alpha|beta|rc"))][0] | (.published_at // .created_at)' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "tags=with_gvisor,with_quic,with_dhcp,with_utls,with_clash_api" >> $GITHUB_OUTPUT

      - name: 版本比对
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          ver="${{ steps.version.outputs.version }}"
          t="${{ steps.version.outputs.time }}"
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            echo "skip_update=false" >> $GITHUB_OUTPUT
          elif echo "${current_body}" | grep -q "reF1nd-Test.*${ver}.*${t}"; then
