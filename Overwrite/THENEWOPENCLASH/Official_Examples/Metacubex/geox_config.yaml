# ==========================================================
# rules（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则列表，默认注释不启用。
# 常用操作：
#   +rules: [...]   在规则列表开头插入（优先匹配）
#   rules+: [...]   在规则列表末尾追加
#   rules!: [...]   强制替换整个规则列表（丢弃原有规则）
# 参考上方示例，通常不需要取消注释整个 rules，而是用 +rules/rules+ 追加即可。
# ==========================================================
#
# rules:
# - GEOIP,lan,直连,no-resolve
# - GEOSITE,github,Github
# - GEOSITE,twitter,Twitter
# - GEOSITE,youtube,YouTube
# - GEOSITE,google,Google
# - GEOSITE,telegram,Telegram
# - GEOSITE,netflix,NETFLIX
# - GEOSITE,bilibili,哔哩哔哩
# - GEOSITE,bahamut,巴哈姆特
# - GEOSITE,spotify,Spotify
# - GEOSITE,CN,国内
# - GEOSITE,geolocation-!cn,其他
# - GEOIP,google,Google
# - GEOIP,netflix,NETFLIX
# - GEOIP,telegram,Telegram
# - GEOIP,twitter,Twitter
# - GEOIP,CN,国内
# - MATCH,其他

# ==========================================================
# dns（从源文件直接提取）
# ----------------------------------------------------------
# 原始 DNS 配置，默认注释不启用。
# 如只需修改部分字段，直接写需要修改的键值即可（默认合并，不影响其他字段）。
# 如需完整替换 DNS 配置，使用 dns!: 操作符。
# ==========================================================
#
# dns:
#   default-nameserver:
#   - tls://223.5.5.5
#   - tls://223.6.6.6
#   enable: true
#   enhanced-mode: fake-ip
#   fake-ip-filter:
#   - '*'
#   - +.lan
#   - +.local
#   - +.market.xiaomi.com
#   ipv6: true
#   nameserver:
#   - https://doh.pub/dns-query
#   - https://dns.alidns.com/dns-query
