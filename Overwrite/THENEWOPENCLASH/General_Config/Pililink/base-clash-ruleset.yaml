# ==========================================================
# rules（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则列表，默认注释不启用。
# 常用操作：
#   +rules: [...]   在规则列表开头插入（优先匹配）
#   rules+: [...]   在规则列表末尾追加
#   rules!: [...]   强制替换整个规则列表（丢弃原有规则）
# 参考上方示例，通常不需要取消注释整个 rules，而是用 +rules/rules+ 追加即可。
# ==========================================================
#
# rules:
# - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
# - RULE-SET,myignore,DIRECT
# - RULE-SET,ads,🛑 广告拦截
# - RULE-SET,private,🔒 私有网络
# - RULE-SET,myproxy,🪜 代理域名
# - RULE-SET,microsoft-cn,🪟 微软服务
# - RULE-SET,apple-cn,🍎 苹果服务
# - RULE-SET,google-cn,🇬 谷歌服务
# - RULE-SET,games-cn,🎮 游戏服务
# - RULE-SET,ai,🤖 人工智能
# - RULE-SET,networktest,📈 网络测试
# - RULE-SET,proxy,🪜 代理域名
# - RULE-SET,cn,🇨🇳 直连域名
# - RULE-SET,telegramip,📲 电报消息,no-resolve
# - RULE-SET,privateip,🔒 私有网络,no-resolve
# - RULE-SET,cnip,🇨🇳 直连 IP
# - MATCH,🐟 漏网之鱼
