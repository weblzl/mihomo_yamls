# ==========================================================
# dns（从源文件直接提取）
# ----------------------------------------------------------
# 原始 DNS 配置，默认注释不启用。
# 如只需修改部分字段，直接写需要修改的键值即可（默认合并，不影响其他字段）。
# 如需完整替换 DNS 配置，使用 dns!: 操作符。
# ==========================================================
#
# dns:
#   enable: true
#   enhanced-mode: fake-ip
#   fake-ip-filter:
#   - '*.lan'
#   - rule-set:add_direct_domain
#   - geosite:cn
#   fake-ip-filter-mode: blacklist
#   fake-ip-range: 198.18.0.1/16
#   ipv6: true
#   listen: 0.0.0.0:7874
#   nameserver:
