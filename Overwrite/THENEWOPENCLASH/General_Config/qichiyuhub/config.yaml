# ==========================================================
# dns（从源文件直接提取）
# ----------------------------------------------------------
# 原始 DNS 配置，默认注释不启用。
# 如只需修改部分字段，直接写需要修改的键值即可（默认合并，不影响其他字段）。
# 如需完整替换 DNS 配置，使用 dns!: 操作符。
# ==========================================================
#
# dns:
#   cache-algorithm: arc
#   default-nameserver:
#   - https://223.5.5.5/dns-query
#   enable: true
#   enhanced-mode: fake-ip
#   fake-ip-filter:
#   - rule-set:fakeipfilter_domain
#   fake-ip-filter-mode: blacklist
#   fake-ip-range: 28.0.0.1/8
#   ipv6: false
#   listen: 0.0.0.0:1053
#   nameserver:
#   - https://dns.alidns.com/dns-query
#   - https://doh.pub/dns-query
#   proxy-server-nameserver:
#   - https://dns.alidns.com/dns-query
#   - https://doh.pub/dns-query
#   respect-rules: true
