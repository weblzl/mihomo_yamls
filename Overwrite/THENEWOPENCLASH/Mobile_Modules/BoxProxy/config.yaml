# ==========================================================
# rules（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则列表，默认注释不启用。
# 常用操作：
#   +rules: [...]   在规则列表开头插入（优先匹配）
#   rules+: [...]   在规则列表末尾追加
#   rules!: [...]   强制替换整个规则列表（丢弃原有规则）
# 参考上方示例，通常不需要取消注释整个 rules，而是用 +rules/rules+ 追加即可。
# ==========================================================
#
# rules:
# - DST-PORT,53,DNS_Hijack
# - RULE-SET,proxy_domain,国外代理
# - OR,((RULE-SET,cn_ip),(RULE-SET,cn_domain),(RULE-SET,private_ip),(RULE-SET,private_domain)),国内直连
# - MATCH,漏网之鱼

# ==========================================================
# dns（从源文件直接提取）
# ----------------------------------------------------------
# 原始 DNS 配置，默认注释不启用。
# 如只需修改部分字段，直接写需要修改的键值即可（默认合并，不影响其他字段）。
# 如需完整替换 DNS 配置，使用 dns!: 操作符。
# ==========================================================
#
# dns:
#   enable: true
#   enhanced-mode: fake-ip
#   fake-ip-filter:
#   - rule-set:Fake-IP-Filter
#   fake-ip-range: 198.18.0.1/16
#   ipv6: true
#   listen: 0.0.0.0:1053
#   nameserver:
#   - 8.8.8.8
#   nameserver-policy:
#     rule-set:cn_domain:
#     - 223.5.5.5
#   proxy-server-nameserver:
#   - 223.5.5.5
